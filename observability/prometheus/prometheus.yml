global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: "app1"
    static_configs:
      - targets: ["app1:8000"]
    metrics_path: /metrics

  - job_name: "app2"
    static_configs:
      - targets: ["app2:3001"]
    metrics_path: /metrics
