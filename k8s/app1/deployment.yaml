apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: devops-challenge
  labels:
    app: app1
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # sobe 1 pod novo antes de matar o antigo
      maxUnavailable: 0  # zero downtime
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          # Substitua PROJECT_ID e REGION antes de aplicar
          # ou use o CI/CD que injeta a imagem correta
          image: us-central1-docker.pkg.dev/PROJECT_ID/devops-challenge/app1:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: APP_ENV
              value: "production"
