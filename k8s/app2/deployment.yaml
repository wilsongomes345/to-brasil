apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  namespace: devops-challenge
  labels:
    app: app2
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero downtime
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: us-central1-docker.pkg.dev/PROJECT_ID/devops-challenge/app2:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: "production"
