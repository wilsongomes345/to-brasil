version: 2
updates:
  # Python — App 1
  - package-ecosystem: "pip"
    directory: "/app1"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "python"]

  # Node.js — App 2
  - package-ecosystem: "npm"
    directory: "/app2"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "nodejs"]

  # Dockerfiles
  - package-ecosystem: "docker"
    directory: "/app1"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/app2"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci-cd"]

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "terraform"]
