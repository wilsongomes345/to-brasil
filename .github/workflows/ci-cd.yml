name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:  us-central1
  ZONE:    us-central1-a
  REPO:    devops-challenge
  VM_NAME: devops-challenge-vm

jobs:
  # ============================================================
  # JOB 1 — Testes
  # ============================================================
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testar App 1 (Python/FastAPI)
        run: |
          cd app1
          pip install -r requirements.txt "httpx<0.28" pytest
          pytest test_main.py -v

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Testar App 2 (Node.js/Express)
        run: |
          cd app2
          npm install
          npm test

  # ============================================================
  # JOB 2 — Build e Push (apenas na main)
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker → Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build e push App 1
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
        run: |
          docker build -t $REGISTRY/app1:latest -t $REGISTRY/app1:${{ github.sha }} ./app1
          docker push $REGISTRY/app1:latest
          docker push $REGISTRY/app1:${{ github.sha }}

      - name: Build e push App 2
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
        run: |
          docker build -t $REGISTRY/app2:latest -t $REGISTRY/app2:${{ github.sha }} ./app2
          docker push $REGISTRY/app2:latest
          docker push $REGISTRY/app2:${{ github.sha }}

  # ============================================================
  # JOB 3 — Infra (Terraform) + Deploy via SSH
  # ============================================================
  deploy:
    name: Deploy GCE
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      # Terraform gerencia VM + Artifact Registry + Firewall
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform — criar/manter infraestrutura
        env:
          PROJECT:            ${{ secrets.GCP_PROJECT_ID }}
          # Terraform usa GOOGLE_CREDENTIALS para autenticar
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          cd infra/terraform

          cat > terraform.tfvars <<EOF
          project_id = "$PROJECT"
          region     = "${{ env.REGION }}"
          zone       = "${{ env.ZONE }}"
          repo_name  = "${{ env.REPO }}"
          EOF

          # Bucket de estado foi criado pelo setup.sh
          terraform init \
            -input=false \
            -backend-config="bucket=$PROJECT-tfstate" \
            -backend-config="prefix=devops-challenge"

          terraform apply -auto-approve -input=false

          # Exporta o IP para os próximos steps
          echo "VM_IP=$(terraform output -raw vm_ip)" >> $GITHUB_ENV

      - name: Aguardar VM estar pronta
        run: |
          echo "VM IP: $VM_IP"
          echo "Aguardando health check..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 \
              "http://$VM_IP/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "VM pronta!"
              exit 0
            fi
            echo "Tentativa $i/40 (status=$STATUS)..."
            sleep 15
          done
          echo "VM ainda não respondeu — pode ser primeiro boot (startup script ainda rodando)"

      - name: Deploy via SSH
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
          PROJECT:  ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.ZONE }} \
            --project=$PROJECT \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              set -e
              cd /opt/app
              git pull origin main
              echo 'REGISTRY=$REGISTRY' > .env
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              docker compose -f docker-compose.prod.yml ps
            "

      - name: Resumo do deploy
        run: |
          echo "## Deploy concluído!" >> $GITHUB_STEP_SUMMARY
          echo "| Serviço | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App 1 texto   (cache 10s) | http://$VM_IP/app1/text |" >> $GITHUB_STEP_SUMMARY
          echo "| App 1 horário (cache 10s) | http://$VM_IP/app1/time |" >> $GITHUB_STEP_SUMMARY
          echo "| App 2 texto   (cache 60s) | http://$VM_IP/app2/text |" >> $GITHUB_STEP_SUMMARY
          echo "| App 2 horário (cache 60s) | http://$VM_IP/app2/time |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | http://$VM_IP:9090 |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana (admin/admin) | http://$VM_IP:3000 |" >> $GITHUB_STEP_SUMMARY
