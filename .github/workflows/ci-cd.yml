name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  REPO_NAME: devops-challenge
  CLUSTER_NAME: devops-challenge-cluster
  NAMESPACE: devops-challenge

jobs:
  # ============================================================
  # JOB 1 — Testes das aplicações
  # ============================================================
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── App 1: Python / FastAPI ──────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências App 1
        run: |
          cd app1
          pip install -r requirements.txt
          pip install "httpx<0.28" pytest

      - name: Testar App 1 (pytest)
        run: |
          cd app1
          pytest test_main.py -v

      # ── App 2: Node.js / Express ─────────────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências App 2
        run: |
          cd app2
          npm ci

      - name: Testar App 2 (Node test runner)
        run: |
          cd app2
          npm test

  # ============================================================
  # JOB 2 — Build e push das imagens (apenas na main)
  # ============================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker auth no Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build e push — App 1 (Python/FastAPI)
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}
        run: |
          docker build \
            -t "$REGISTRY/app1:latest" \
            -t "$REGISTRY/app1:${{ github.sha }}" \
            ./app1
          docker push "$REGISTRY/app1:latest"
          docker push "$REGISTRY/app1:${{ github.sha }}"

      - name: Build e push — App 2 (Node.js/Express)
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}
        run: |
          docker build \
            -t "$REGISTRY/app2:latest" \
            -t "$REGISTRY/app2:${{ github.sha }}" \
            ./app2
          docker push "$REGISTRY/app2:latest"
          docker push "$REGISTRY/app2:${{ github.sha }}"

  # ============================================================
  # JOB 3 — Deploy no GKE (apenas na main)
  # ============================================================
  deploy:
    name: Deploy GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar kubectl (credenciais do GKE)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Aplicar namespace e ConfigMaps
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/nginx/configmap.yaml
          kubectl apply -f k8s/observability/prometheus/configmap.yaml
          kubectl apply -f k8s/observability/grafana/configmap.yaml
          kubectl apply -f k8s/observability/prometheus/pvc.yaml
          kubectl apply -f k8s/observability/grafana/pvc.yaml

      - name: Substituir imagem App 1 pelo SHA do commit
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}
        run: |
          sed -i "s|us-central1-docker.pkg.dev/PROJECT_ID/devops-challenge/app1:latest|$REGISTRY/app1:${{ github.sha }}|g" \
            k8s/app1/deployment.yaml

      - name: Substituir imagem App 2 pelo SHA do commit
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}
        run: |
          sed -i "s|us-central1-docker.pkg.dev/PROJECT_ID/devops-challenge/app2:latest|$REGISTRY/app2:${{ github.sha }}|g" \
            k8s/app2/deployment.yaml

      - name: Deploy de todos os manifests no GKE
        run: |
          kubectl apply -f k8s/app1/
          kubectl apply -f k8s/app2/
          kubectl apply -f k8s/nginx/
          kubectl apply -f k8s/observability/prometheus/
          kubectl apply -f k8s/observability/grafana/

      - name: Aguardar rollout App 1 (zero downtime)
        run: kubectl rollout status deployment/app1 -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Aguardar rollout App 2 (zero downtime)
        run: kubectl rollout status deployment/app2 -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Aguardar rollout Nginx
        run: kubectl rollout status deployment/nginx -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Exibir URLs finais
        run: |
          echo "Aguardando IP externo do LoadBalancer..."
          for i in {1..12}; do
            IP=$(kubectl get svc nginx -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "## Deploy GKE concluido!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Servico | URL |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
              echo "| App 1 texto | http://$IP/app1/text |" >> $GITHUB_STEP_SUMMARY
              echo "| App 1 horario | http://$IP/app1/time |" >> $GITHUB_STEP_SUMMARY
              echo "| App 2 texto | http://$IP/app2/text |" >> $GITHUB_STEP_SUMMARY
              echo "| App 2 horario | http://$IP/app2/time |" >> $GITHUB_STEP_SUMMARY
              break
            fi
            echo "Aguardando... ($i/12)"
            sleep 10
          done

      - name: Status final dos pods
        run: kubectl get pods -n ${{ env.NAMESPACE }}
