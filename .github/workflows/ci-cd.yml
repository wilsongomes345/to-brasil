name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Testes + verificação de vulnerabilidades nas dependências
  # ============================================================
  test:
    name: Testes & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── App 1 — Python / FastAPI ──────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testar App 1 (Python/FastAPI)
        run: |
          cd app1
          pip install -r requirements.txt "httpx<0.28" pytest
          pytest test_main.py -v

      - name: Vulnerabilidades Python (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r app1/requirements.txt --desc on || true

      # ── App 2 — Node.js / Express ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Testar App 2 (Node.js/Express)
        run: |
          cd app2
          npm install
          npm test

      - name: Vulnerabilidades Node.js (npm audit)
        run: |
          cd app2
          npm audit --audit-level=critical || true

  # ============================================================
  # Verifica que as imagens Docker constroem sem erros
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build App 1
        run: docker build -t app1:test ./app1

      - name: Build App 2
        run: docker build -t app2:test ./app2
