name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:   us-central1
  ZONE:     us-central1-a
  REPO:     devops-challenge
  VM_NAME:  devops-challenge-vm

jobs:
  # ============================================================
  # JOB 1 — Testes
  # ============================================================
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # App 1 — Python / FastAPI
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar e testar App 1
        run: |
          cd app1
          pip install -r requirements.txt "httpx<0.28" pytest
          pytest test_main.py -v

      # App 2 — Node.js / Express
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar e testar App 2
        run: |
          cd app2
          npm install
          npm test

  # ============================================================
  # JOB 2 — Build e push (apenas na main)
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker → Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build e push App 1 (Python/FastAPI)
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
        run: |
          docker build -t $REGISTRY/app1:latest -t $REGISTRY/app1:${{ github.sha }} ./app1
          docker push $REGISTRY/app1:latest
          docker push $REGISTRY/app1:${{ github.sha }}

      - name: Build e push App 2 (Node.js/Express)
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
        run: |
          docker build -t $REGISTRY/app2:latest -t $REGISTRY/app2:${{ github.sha }} ./app2
          docker push $REGISTRY/app2:latest
          docker push $REGISTRY/app2:${{ github.sha }}

  # ============================================================
  # JOB 3 — Deploy via SSH na VM GCE
  # ============================================================
  deploy:
    name: Deploy GCE
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via SSH (gcloud compute ssh)
        env:
          REGISTRY: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}
          PROJECT:  ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.ZONE }} \
            --project=$PROJECT \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              set -e
              cd /opt/app
              git pull origin main
              echo 'REGISTRY=$REGISTRY' > .env
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              docker compose -f docker-compose.prod.yml ps
            "

      - name: Exibir URLs
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IP=$(gcloud compute instances describe ${{ env.VM_NAME }} \
            --zone=${{ env.ZONE }} --project=$PROJECT \
            --format="get(networkInterfaces[0].accessConfigs[0].natIP)")
          echo "## Deploy concluído!" >> $GITHUB_STEP_SUMMARY
          echo "| Rota | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App 1 texto   (cache 10s) | http://$IP/app1/text |" >> $GITHUB_STEP_SUMMARY
          echo "| App 1 horário (cache 10s) | http://$IP/app1/time |" >> $GITHUB_STEP_SUMMARY
          echo "| App 2 texto   (cache 60s) | http://$IP/app2/text |" >> $GITHUB_STEP_SUMMARY
          echo "| App 2 horário (cache 60s) | http://$IP/app2/time |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | http://$IP:9090 |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana    | http://$IP:3000 |" >> $GITHUB_STEP_SUMMARY
